services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: rentwheels-backend
    env_file:
      - ./.env
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
