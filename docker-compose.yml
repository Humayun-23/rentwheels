services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: rentwheels-backend
    env_file:
      - ./.env
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
  proxy:
    image: nginx:alpine
    container_name: rentwheels-nginx
    ports:
      - "80:80"
      - "443:443" # Uncomment when you get a domain and add SSL
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt   # Stores the generated certificates
      - ./certbot/www:/var/www/certbot    # Shared folder for the validation challenge
    depends_on:
      - backend
    restart: unless-stopped