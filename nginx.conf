# 1. Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name rentwheels.duckdns.org;

    # Keep this open for future certificate renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Handle the secure HTTPS traffic
server {
    listen 443 ssl;
    server_name rentwheels.duckdns.org;

    # Point to your newly generated certificates
    ssl_certificate /etc/letsencrypt/live/rentwheels.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentwheels.duckdns.org/privkey.pem;

    # Recommended SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://rentwheels-backend:8000;
        
        # Pass essential headers to your Python app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}